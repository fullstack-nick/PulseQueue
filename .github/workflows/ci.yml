name: ci

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: pulsequeue
          POSTGRES_PASSWORD: pulsequeue
          POSTGRES_DB: pulsequeue
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulsequeue -d pulsequeue"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - name: Download modules
        run: go mod download
      - name: Test
        env:
          PULSEQUEUE_TEST_DATABASE_URL: postgres://pulsequeue:pulsequeue@localhost:5432/pulsequeue?sslmode=disable
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Docker build
        run: docker build -t pulsequeue:ci .
      - uses: azure/setup-helm@v4
        with:
          version: v3.19.0
      - name: Helm lint
        run: helm lint deployments/helm/pulsequeue
      - name: Helm template
        run: helm template pulsequeue deployments/helm/pulsequeue --namespace pulsequeue-k3s > /tmp/pulsequeue-helm.yaml
      - name: Kubernetes schema validation
        run: |
          docker run --rm -v "$PWD:/work" ghcr.io/yannh/kubeconform:v0.7.0 -strict -summary -ignore-missing-schemas /work/deployments/k8s
          docker run --rm -v /tmp:/tmp ghcr.io/yannh/kubeconform:v0.7.0 -strict -summary -ignore-missing-schemas /tmp/pulsequeue-helm.yaml
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
      - name: Terraform fmt
        run: terraform -chdir=deployments/gcp/terraform fmt -check
      - name: Terraform validate
        run: |
          terraform -chdir=deployments/gcp/terraform init -backend=false
          terraform -chdir=deployments/gcp/terraform validate
      - name: Cost guardrails
        shell: pwsh
        run: ./deployments/gcp/scripts/check-cost-guardrails.ps1

  publish-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Compute image tags
        id: image
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/fullstack-nick/pulsequeue:main
            ghcr.io/fullstack-nick/pulsequeue:sha-${{ steps.image.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/fullstack-nick/PulseQueue
            org.opencontainers.image.revision=${{ github.sha }}

apiVersion: v1
kind: Service
metadata:
  name: pulsequeue-api
  namespace: pulsequeue-k3s
  labels:
    app.kubernetes.io/name: pulsequeue-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pulsequeue
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulsequeue-api
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsequeue-api
  namespace: pulsequeue-k3s
  labels:
    app.kubernetes.io/name: pulsequeue-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pulsequeue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsequeue-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsequeue-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: pulsequeue
    spec:
      containers:
        - name: api
          image: ghcr.io/fullstack-nick/pulsequeue:main
          imagePullPolicy: IfNotPresent
          args: ["server"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: pulsequeue-config
          env:
            - name: PULSEQUEUE_SERVICE_NAME
              value: pulsequeue-api
            - name: PULSEQUEUE_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pulsequeue-secrets
                  key: operator-token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pulsequeue-secrets
                  key: postgres-password
            - name: PULSEQUEUE_DATABASE_URL
              value: postgres://pulsequeue:$(POSTGRES_PASSWORD)@postgres:5432/pulsequeue?sslmode=disable
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi

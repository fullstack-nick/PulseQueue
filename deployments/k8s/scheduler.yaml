apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsequeue-scheduler
  namespace: pulsequeue-k3s
  labels:
    app.kubernetes.io/name: pulsequeue-scheduler
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: pulsequeue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsequeue-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsequeue-scheduler
        app.kubernetes.io/component: scheduler
        app.kubernetes.io/part-of: pulsequeue
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/fullstack-nick/pulsequeue:main
          imagePullPolicy: IfNotPresent
          args: ["scheduler"]
          ports:
            - name: metrics
              containerPort: 2112
          envFrom:
            - configMapRef:
                name: pulsequeue-config
          env:
            - name: PULSEQUEUE_SERVICE_NAME
              value: pulsequeue-scheduler
            - name: PULSEQUEUE_METRICS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: pulsequeue-config
                  key: PULSEQUEUE_SCHEDULER_METRICS_ADDR
            - name: PULSEQUEUE_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pulsequeue-secrets
                  key: operator-token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pulsequeue-secrets
                  key: postgres-password
            - name: PULSEQUEUE_DATABASE_URL
              value: postgres://pulsequeue:$(POSTGRES_PASSWORD)@postgres:5432/pulsequeue?sslmode=disable
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi

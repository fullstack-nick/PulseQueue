apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsequeue-worker
  namespace: pulsequeue-k3s
  labels:
    app.kubernetes.io/name: pulsequeue-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: pulsequeue
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsequeue-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsequeue-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: pulsequeue
    spec:
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://pulsequeue-api:8080/health/ready | grep -q '"ready"'; do sleep 2; done
      containers:
        - name: worker
          image: ghcr.io/fullstack-nick/pulsequeue:main
          imagePullPolicy: IfNotPresent
          args:
            - worker
            - --queue
            - $(PULSEQUEUE_WORKER_QUEUE)
            - --concurrency
            - $(PULSEQUEUE_WORKER_CONCURRENCY)
          ports:
            - name: metrics
              containerPort: 2112
          envFrom:
            - configMapRef:
                name: pulsequeue-config
          env:
            - name: PULSEQUEUE_SERVICE_NAME
              value: pulsequeue-worker
            - name: PULSEQUEUE_METRICS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: pulsequeue-config
                  key: PULSEQUEUE_WORKER_METRICS_ADDR
            - name: PULSEQUEUE_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pulsequeue-secrets
                  key: operator-token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pulsequeue-secrets
                  key: postgres-password
            - name: PULSEQUEUE_DATABASE_URL
              value: postgres://pulsequeue:$(POSTGRES_PASSWORD)@postgres:5432/pulsequeue?sslmode=disable
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi

apiVersion: v1
kind: Service
metadata:
  name: pulsequeue-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: pulsequeue-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pulsequeue
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulsequeue-api
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsequeue-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: pulsequeue-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: pulsequeue
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsequeue-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsequeue-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: pulsequeue
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: {{ .Values.init.image | quote }}
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do sleep 2; done
              until nc -z nats 4222; do sleep 2; done
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["server"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: pulsequeue-config
          env:
            - name: PULSEQUEUE_SERVICE_NAME
              value: pulsequeue-api
            - name: PULSEQUEUE_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: operator-token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: postgres-password
            - name: PULSEQUEUE_DATABASE_URL
              value: postgres://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}?sslmode=disable
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.api.resources | indent 12 }}

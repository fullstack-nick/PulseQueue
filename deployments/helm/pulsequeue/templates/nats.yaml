apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: pulsequeue
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nats
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitor
      port: 8222
      targetPort: monitor
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: pulsequeue
spec:
  serviceName: nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: pulsequeue
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image | quote }}
          imagePullPolicy: IfNotPresent
          args: ["-js", "-sd", "/data"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
{{ toYaml .Values.nats.resources | indent 12 }}
          volumeMounts:
            - name: nats-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.nats.storage }}
